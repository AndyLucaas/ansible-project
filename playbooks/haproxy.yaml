---
- name: Copier un dossier depuis l'hôte vers les serveurs web
  hosts: haproxy
  become: true
  tasks:
    - name: Installer HAproxy
      apt: 
        name: haproxy
        state: present
    - name: Configuration de HAProxy
      copy:
        content: |       
          global
              log /dev/log local0
              log /dev/log local1 notice
              chroot /var/lib/haproxy
              stats socket /run/haproxy/admin.sock mode 660 level admin
              stats timeout 30s
              user haproxy
              group haproxy
              daemon

          defaults
              log global
              option dontlognull
              timeout connect 5000ms
              timeout client  50000ms
              timeout server  50000ms

          frontend http_frontend
              bind *:80
              mode http
              default_backend web_backend

          backend web_backend
              mode http
              balance roundrobin
              option httpchk
              server webserver1 192.168.56.11:80 check
              server webserver2 192.168.56.12:80 check

          listen stats
              bind *:8080
              stats enable
              stats uri /stats
              stats auth admin:123

        dest: /etc/haproxy/haproxy.conf
    
    - name: Start et enable HAProxy
      systemd:
        name: haproxy
        state: started
        enabled: true
    
    - name: Installer Keepalived
      apt:
        name: keepalived
        state: present

    - name: Configuration BACKUP
      copy:
        content: | 
            vrrp_script chk_haproxy {
                script "killall -0 haproxy"
                interval 2
                weight 2
            }
            # Configuation for the virtual interface
            vrrp_instance VI_1 {
                interface eth2
                state BACKUP
                priority 100
                virtual_router_id 51
                smtp_alert
                authentication {
                    auth_type AH
                    auth_pass 123
                }
                # The virtual ip address shared between the two loadbalancers
                virtual_ipaddress {
                    192.168.56.18
                }
                # Use the script above to check if we should fail over
                track_script {
                    chk_haproxy
                }
            }

        dest: /etc/keepalived/keepalived.conf

    - name: Start et enable Keepalived
      systemd:
        name: keepalived
        state: started
        enabled: true
