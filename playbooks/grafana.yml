---
- name: Installer Grafana sur les serveurs
  hosts: all
  become: true
  tasks:
    - name: Installer gpg
      apt:
        name: gnupg
        state: present
    - name: Ajouter la clé GPG de Grafana
      apt_key:
        url: https://packages.grafana.com/gpg.key
        state: present
    - name: Ajouter le dépôt de Grafana à la liste des sources
      apt_repository:
        repo: "deb https://packages.grafana.com/oss/deb stable main"
        state: present

    - name: Mettre à jour la liste des paquets
      apt:
        update_cache: yes

    - name: Installer Grafana
      apt:
        name: grafana
        state: present

    - name: Démarrer et activer le service Grafana
      systemd:
        name: grafana-server
        enabled: true
        state: started

    - name: Ouvrir le port 3000 pour Grafana avec iptables
      command: iptables -A INPUT -p tcp --dport 3000 -j ACCEPT

    - name: Créer le répertoire pour les règles iptables si nécessaire
      file:
        path: /etc/iptables
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Sauvegarder les règles iptables
      shell: iptables-save > /etc/iptables/rules.v4

    - name: Installer iptables-persistent pour persister les règles au redémarrage
      apt:
        name: iptables-persistent
        state: present
