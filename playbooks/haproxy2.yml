---
- name: Copier un dossier depuis l'hôte vers les serveurs web
  hosts: haproxy
  become: true
  tasks:
    - name: Installer HAproxy
      apt: 
        name: haproxy
        state: present
    - name: Configuration de HAProxy
      copy:
        content: |       
          global
              log /dev/log local0
              log /dev/log local1 notice
              chroot /var/lib/haproxy
              stats socket /run/haproxy/admin.sock mode 660 level admin
              stats timeout 30s
              user haproxy
              group haproxy
              daemon

          defaults
              log global
              option dontlognull
              timeout connect 5000ms
              timeout client  50000ms
              timeout server  50000ms

          frontend myweb
              bind *:80
              option tcplog
              mode tcp
              default_backend web-servers
          backend web-servers
              mode tcp
              balance roundrobin
              option tcp-check
              server web1 192.168.56.11:80 check fall 3 rise 2
              server web2 192.168.56.12:80 check fall 3 rise 2

          listen stats
              bind *:8080
              stats enable
              stats uri /stats
              stats auth admin:123

        dest: /etc/haproxy/haproxy.conf
    
    - name: Start et enable HAProxy
      systemd:
        name: haproxy
        state: started
        enabled: true
    
    - name: Installer Keepalived
      apt:
        name: keepalived
        state: present

    - name: Configuration MASTER
      copy:
        content: | 
              vrrp_script chk_haproxy {
                  script "killall -0 haproxy"
                  interval 2
                  weight 2
              }
              vrrp_instance VI_1 {
                  interface eth2
                  state MASTER  # set this to BACKUP on the other machine
                  priority 101  # set this to 100 on the other machine
                  virtual_router_id 51
                  smtp_alert
                  authentication {
                      auth_type AH
                      auth_pass 123
                  }
                  virtual_ipaddress {
                      192.168.56.17
                  }
                  track_script {
                      chk_haproxy
                  }
              }
        dest: /etc/keepalived/keepalived.conf
      
    - name: Start et enable Keepalived
      systemd:
        name: keepalived
        state: started
        enabled: true
