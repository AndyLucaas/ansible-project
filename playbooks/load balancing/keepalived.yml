---
- name: Playbook pour installer et configurer Nginx
  hosts: webserver
  become: yes  
  tags:
    - name: Installer Keepalived
      apt:
        name: keepalived
        state: present

    - name: Configuration MASTER
      copy:
        content: | 
              vrrp_script chk_haproxy {
                  script "killall -0 haproxy"
                  interval 2
                  weight 2
              }
              vrrp_instance VI_1 {
                  interface eth1
                  state MASTER  # set this to BACKUP on the other machine
                  priority 101  # set this to 100 on the other machine
                  virtual_router_id 51 
                  smtp_alert
                  authentication {
                      auth_type AH
                      auth_pass 123
                  }
                  virtual_ipaddress {
                      192.168.56.18
                  }
                  track_script {
                      chk_haproxy
                  }
              }
        dest: /etc/keepalived/keepalived.conf
      when: ansible_hostname == 'serveur1'

    - name: Configuration BACKUP
      copy:
        content: | 
            vrrp_script chk_haproxy {
                script "killall -0 haproxy"
                interval 2
                weight 2
            }
            # Configuation for the virtual interface
            vrrp_instance VI_1 {
                interface eth2
                state BACKUP
                priority 100
                virtual_router_id 51
                smtp_alert
                authentication {
                    auth_type AH
                    auth_pass 123
                }
                # The virtual ip address shared between the two loadbalancers
                virtual_ipaddress {
                    192.168.56.18
                }
                # Use the script above to check if we should fail over
                track_script {
                    chk_haproxy
                }
            }

        dest: /etc/keepalived/keepalived.conf
      when: ansible_hostname == 'serveur2'

    - name: Start et enable Keepalived
      systemd:
        name: keepalived
        state: started
        enabled: true
